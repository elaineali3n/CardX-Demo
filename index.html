document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nMC44NScgbnVtT2N0YXZlcz0nMicgc3RpdGNoVGlsZXM9J3N0aXRjaCcvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPScxMDAlJyBoZWlnaHQ9JzEwMCUnIGZpbHRlcj0ndXJsKCNuKScvPjwvc3ZnPg==\")}\n.vign{position:absolute;inset:0;background:radial-gradient(130% 100% at 50% 0%, transparent 55%, rgba(0,0,0,.55) 100%)}\n\n.wrap{max-width:1180px;margin:0 auto;padding:0 56px;position:relative;z-index:2}\n.eyebrow{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.42em;text-transform:uppercase;color:var(--gd)}\n.rule{width:64px;height:1px;background:linear-gradient(90deg,transparent,var(--gd),transparent);margin:24px auto}\n\n/* scroll reveal */\n.reveal{opacity:0;transform:translateY(26px);transition:opacity 1s cubic-bezier(.2,.7,.2,1),transform 1s cubic-bezier(.2,.7,.2,1);will-change:opacity,transform}\n.reveal.in{opacity:1;transform:none}\n\n/* logo-first opening */\n.hero-open{min-height:calc(100vh - 68px);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}\n.scrollcue{position:absolute;bottom:38px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:9px;\n  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.36em;text-transform:uppercase;color:var(--dim);opacity:0;animation:cueIn 1.2s ease 1.4s forwards}\n.scrollcue b{color:var(--gd);font-size:14px;font-weight:400;animation:hintbob 1.9s ease-in-out infinite}\n@keyframes cueIn{to{opacity:1}}\n.hero-open .crest{animation:crestIn 1.6s cubic-bezier(.2,.7,.2,1) forwards}\n@keyframes crestIn{0%{transform:scale(.84);filter:blur(1px)}100%{transform:scale(1);filter:blur(0)}}\n\n/* docking crest (desktop) — travels from center into the header mark */\n#dockcrest{position:fixed;left:0;top:0;z-index:6;width:74px;height:74px;display:none;align-items:center;justify-content:center;pointer-events:none;will-change:transform}\n#dockcrest .ring{position:absolute;inset:0;border:1px solid rgba(207,167,95,.55);border-radius:50%}\n#dockcrest .ring.r2{inset:7px;border-color:rgba(207,167,95,.3)}\n#dockcrest .mark{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--gd);font-weight:500;line-height:1}\nbody.dock #dockcrest{display:flex}\nbody.dock .hero-open .crest{visibility:hidden}\nbody.dock header .logo .x{visibility:hidden}\n\n/* hairline rule: draws in left-to-right instead of fading */\n.rule.reveal{opacity:1;transform:scaleX(0);transform-origin:left center;transition:transform 1.15s cubic-bezier(.2,.7,.2,1)}\n.rule.reveal.in{transform:scaleX(1)}\n\n/* topbar */\n@keyframes barIn{to{opacity:1}}\nheader.bar{position:relative;z-index:5;border-bottom:1px solid rgba(207,167,95,.2);opacity:0;animation:barIn 1.1s ease 1s forwards}\nheader.bar .in{max-width:1180px;margin:0 auto;padding:22px 56px;display:flex;align-items:center;justify-content:space-between}\n.logo{font-family:'Marcellus',serif;letter-spacing:.36em;font-size:20px;color:var(--ch);display:flex;align-items:center;gap:12px}\n.logo .x{width:24px;height:24px;border:1px solid var(--gd);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gd)}\nnav{display:flex;gap:30px;font-size:13px;letter-spacing:.18em;color:var(--mut);text-transform:uppercase}\nnav a{transition:color .2s;white-space:nowrap}nav a:hover{color:var(--gd)}\n.bar .status{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.26em;color:var(--gd);text-transform:uppercase;display:flex;align-items:center;gap:9px}\n.bar .status::before{content:\"\";width:6px;height:6px;border-radius:50%;background:var(--gd);box-shadow:0 0 9px var(--gd)}\n\n/* hero */\n.hero{position:relative;z-index:2;text-align:center;padding:0 0 84px}\n.crest{width:74px;height:74px;margin:0 auto 26px;position:relative;display:flex;align-items:center;justify-content:center}\n.crest .ring{position:absolute;inset:0;border:1px solid rgba(207,167,95,.55);border-radius:50%}\n.crest .ring.r2{inset:7px;border-color:rgba(207,167,95,.3)}\n.crest .mark{font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--gd);font-weight:500}\n.drop-badge{display:inline-flex;align-items:center;gap:12px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.34em;color:var(--gd);text-transform:uppercase;border:1px solid rgba(207,167,95,.4);padding:9px 18px;border-radius:2px}\n.drop-badge i{width:5px;height:5px;background:var(--gd);transform:rotate(45deg)}\n.hero h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:118px;line-height:.92;color:var(--ch);letter-spacing:.005em;margin:22px 0 0}\n.hero h1 em{font-style:italic;color:var(--gd)}\n.hero .sub{font-family:'Jost',sans-serif;font-weight:300;font-size:17px;letter-spacing:.5em;color:#b6a884;text-transform:uppercase;margin-top:20px}\n.hero .lede{font-family:'Cormorant Garamond',serif;font-size:23px;line-height:1.55;color:#c8bca3;max-width:660px;margin:30px auto 0}\n.hero .locator{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.28em;color:var(--dim);text-transform:uppercase;margin-top:26px}\n\n/* surprise-drop panel (replaces countdown) */\n.drop-note{max-width:720px;margin:46px auto 0;padding:34px 40px;position:relative;\n  border:1px solid rgba(207,167,95,.26);background:linear-gradient(180deg,rgba(207,167,95,.05),rgba(0,0,0,.18))}\n.drop-note::before,.drop-note::after{content:\"\";position:absolute;width:12px;height:12px}\n.drop-note::before{left:-1px;top:-1px;border-left:1px solid var(--gd);border-top:1px solid var(--gd)}\n.drop-note::after{right:-1px;bottom:-1px;border-right:1px solid var(--gd);border-bottom:1px solid var(--gd)}\n.drop-note .q{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:27px;line-height:1.4;color:var(--ch)}\n.drop-note .q b{font-style:normal;font-weight:500;color:var(--gd)}\n.drop-note .k{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;margin-bottom:16px}\n\n/* waitlist */\n.wl{display:flex;max-width:480px;margin:26px auto 0;border:1px solid rgba(207,167,95,.45);background:rgba(207,167,95,.04);border-radius:2px}\n.wl input{flex:1;background:transparent;border:none;outline:none;font-family:'Jost',sans-serif;font-size:14.5px;letter-spacing:.03em;color:var(--ch);padding:0 18px}\n.wl input::placeholder{color:var(--dim)}\n.wl button{cursor:pointer;border:none;font-family:'Jost',sans-serif;font-weight:600;letter-spacing:.22em;text-transform:uppercase;font-size:12.5px;padding:17px 26px;background:linear-gradient(180deg,var(--ch),var(--gd));color:#241a08;transition:.2s;white-space:nowrap}\n.wl button:hover{background:var(--ch)}\n.wl.done{justify-content:center;align-items:center;color:var(--gd);letter-spacing:.22em;font-size:13px;padding:17px;text-transform:uppercase;font-family:'Jost',sans-serif}\n.micro{font-family:'Space Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:.18em;margin-top:16px;text-transform:uppercase}\n.wl.gate{max-width:600px}\n.wl.gate input{flex:1;min-width:0}\n.wl .gdiv{width:1px;align-self:stretch;margin:9px 0;background:rgba(207,167,95,.32);flex:none}\n.gatehint{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;margin-top:12px;text-align:center}\n\n/* sections */\n.sec{position:relative;z-index:2;padding:104px 0}\n.sec.alt{background:linear-gradient(180deg,var(--bg2),var(--bg))}\n.gridhead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:44px;gap:30px}\n.gridhead .t{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:52px;color:var(--ch);line-height:1;margin-top:12px}\n.gridhead .c{font-family:'Jost',sans-serif;font-size:13px;color:var(--dim);letter-spacing:.16em;text-transform:uppercase;white-space:nowrap}\n\n/* cards */\n.cardgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}\n.mcard{position:relative;aspect-ratio:3/4;overflow:hidden;cursor:pointer;border-radius:2px;\n  background:radial-gradient(120% 78% at 50% 108%, rgba(207,167,95,.16), rgba(207,167,95,.04) 42%, transparent 66%), linear-gradient(180deg,#15110c,#0a0806);border:1px solid rgba(207,167,95,.28);\n  transition:transform .15s ease-out,box-shadow .4s,border-color .4s}\n.mcard::before{content:\"\";position:absolute;inset:8px;border:1px solid rgba(207,167,95,.16);pointer-events:none;z-index:6}\n.mcard .ser{position:absolute;left:18px;top:16px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--dim);z-index:6;white-space:nowrap}\n.mcard .silwrap{position:absolute;inset:0}\n.mcard .sil{position:absolute;left:50%;bottom:0;transform:translateX(-50%);height:86%;width:auto;object-fit:contain;object-position:bottom;\n  filter:drop-shadow(0 0 5px rgba(207,167,95,.3)) drop-shadow(0 0 1px rgba(236,217,168,.5));opacity:1;transition:filter .4s}\n.mcard .spot{position:absolute;inset:0;z-index:4;opacity:0;transition:opacity .4s;\n  background:radial-gradient(360px 360px at 50% 28%, rgba(236,217,168,.18), transparent 60%)}\n.mcard .foil{position:absolute;inset:0;z-index:5;pointer-events:none;mix-blend-mode:screen;opacity:0;transition:opacity .45s;\n  background:linear-gradient(115deg, transparent 24%, rgba(236,217,168,.62), rgba(150,205,255,.34), rgba(207,167,95,.66), rgba(214,150,255,.32), rgba(236,217,168,.55), transparent 76%);\n  background-size:280% 280%;background-position:50% 50%}\n.mcard:hover .foil{opacity:1}\n.mcard .lock{position:absolute;left:0;right:0;bottom:0;text-align:center;padding:14px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.4em;\n  color:#a99a78;border-top:1px solid rgba(207,167,95,.18);background:linear-gradient(0deg,rgba(0,0,0,.55),transparent);z-index:6}\n.mcard:hover{border-color:var(--gd);box-shadow:0 0 0 1px rgba(207,167,95,.5),0 24px 54px rgba(0,0,0,.6);transform:translateY(-5px)}\n.mcard:hover .spot{opacity:1}\n.mcard:hover .sil{filter:drop-shadow(0 0 16px rgba(236,217,168,.6)) drop-shadow(0 0 2px rgba(236,217,168,.8))}\n\n/* info / features */\n.infohead h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:54px;color:var(--ch);max-width:840px;line-height:1.04;margin-top:14px}\n.feats{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:50px}\n.feat{border:1px solid rgba(207,167,95,.2);padding:32px 28px;background:linear-gradient(180deg,rgba(207,167,95,.03),transparent);border-radius:2px}\n.feat .num{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--gd);display:block}\n.feat h4{font-family:'Marcellus',serif;font-size:21px;margin:14px 0 11px;color:var(--ch);letter-spacing:.02em}\n.feat p{font-size:14.5px;line-height:1.72;color:var(--mut);font-weight:300}\n\n/* rwa */\n.rwa{background:linear-gradient(120deg,var(--bg2),#100707);border-top:1px solid rgba(138,31,44,.4)}\n.rwa .grid2{display:grid;grid-template-columns:1.1fr 1fr;gap:64px;align-items:center}\n.rwa .eyebrow{color:var(--cr);letter-spacing:.42em}\n.rwa h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:46px;color:var(--ch);margin:14px 0 18px;line-height:1.05}\n.rwa p{font-size:15.5px;line-height:1.82;color:var(--mut);font-weight:300}\n.chain{display:flex;flex-direction:column;gap:14px}\n.chip{display:flex;align-items:center;gap:18px;border:1px solid rgba(207,167,95,.24);padding:18px 22px;background:rgba(0,0,0,.3);border-radius:2px}\n.chip .d{width:36px;height:36px;border-radius:50%;border:1px solid var(--gd);color:var(--gd);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:18px;flex:none}\n.chip b{font-family:'Marcellus',serif;font-size:15px;color:var(--ch);display:block;letter-spacing:.03em}\n.chip span{font-size:12px;color:var(--dim);letter-spacing:.08em}\n\n/* series teaser strip */\n.series{position:relative;z-index:2;text-align:center;padding:78px 0;border-top:1px solid rgba(207,167,95,.16);\n  background:radial-gradient(700px 300px at 50% 0%, rgba(207,167,95,.06), transparent 70%)}\n.series .e{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.34em;color:var(--gd);text-transform:uppercase}\n.series h4{font-family:'Cormorant Garamond',serif;font-weight:500;font-style:italic;font-size:40px;color:var(--ch);margin:16px auto 0;max-width:760px;line-height:1.25}\n.series .ticks{display:flex;gap:14px;justify-content:center;align-items:center;margin-top:30px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.2em;color:var(--dim)}\n.series .ticks b{color:var(--gd);border:1px solid var(--gd);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}\n.series .ticks i{width:30px;height:1px;background:rgba(207,167,95,.4);display:inline-block}\n.series .ticks u{width:34px;height:34px;border:1px dashed rgba(207,167,95,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--dim);text-decoration:none;font-size:13px}\n\n/* footer cta */\n.foot{position:relative;z-index:2;text-align:center;padding:108px 0;border-top:1px solid rgba(207,167,95,.18)}\n.foot h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:66px;color:var(--ch);margin-bottom:10px;line-height:1}\n.foot h3 em{font-style:italic;color:var(--gd)}\n.foot p{color:var(--mut);margin:0 auto 6px;font-size:16px;font-weight:300;max-width:540px}\n.credit{position:relative;z-index:2;border-top:1px solid rgba(207,167,95,.16)}\n.credit .in{max-width:1180px;margin:0 auto;padding:28px 56px;display:flex;justify-content:space-between;align-items:center;\n  font-family:'Space Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:.16em;text-transform:uppercase}\n@keyframes foilmove{0%{background-position:0% 0%}100%{background-position:280% 280%}}\n\n/* mobile swipe deck */\n.crew-mobile{display:none}\n.deck-count{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.24em;color:var(--gd);text-align:center;margin-bottom:16px}\n.deck-stage{position:relative;width:100%;max-width:300px;margin:0 auto;aspect-ratio:3/4;touch-action:none}\n.crew-mobile .mcard{position:absolute;inset:0;height:auto;cursor:pointer;\n  transition:transform .55s cubic-bezier(.5,.08,.2,1),opacity .5s,filter .5s}\n.crew-mobile .mcard.active{opacity:1;transform:none;filter:none}\n.crew-mobile .mcard.behind{opacity:.5;transform:scale(.93) translateY(16px);filter:brightness(.6)}\n.crew-mobile .mcard.gone{opacity:0;transform:scale(.9);pointer-events:none}\n.crew-mobile .mcard.out{opacity:0;transform:translateY(-120%) rotate(-4deg)}\n.crew-mobile .mcard.active .foil{opacity:1;animation:foilmove 3.4s linear infinite}\n.deck-hint{margin-top:20px;text-align:center;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--dim)}\n.deck-hint span{display:block;color:var(--gd);font-size:16px;margin-bottom:3px;animation:hintbob 1.6s ease-in-out infinite}\n@keyframes hintbob{0%,100%{transform:translateY(0);opacity:.55}50%{transform:translateY(-5px);opacity:1}}\n\n@media (max-width:760px){\n  .wrap{padding:0 22px}\n  header.bar .in{padding:16px 22px}\n  .logo{font-size:16px;letter-spacing:.26em}\n  nav{display:none}\n  .bar .status{font-size:10px;letter-spacing:.16em}\n  .hero{padding:48px 0 56px}\n  .hero-open{min-height:auto;padding:0}\n  .hero-open .crest{display:none}\n  .scrollcue{display:none}\n  .drop-badge.reveal{opacity:1;transform:none}\n  .crew-mobile .mcard.active.peek{animation:cardpeek 1.05s cubic-bezier(.2,.7,.2,1) both}\n  @keyframes cardpeek{0%{transform:translateY(24px) scale(.97)}100%{transform:translateY(0) scale(1)}}\n  .crest{width:56px;height:56px;margin-bottom:20px}\n  .drop-badge{font-size:9.5px;letter-spacing:.2em;padding:7px 13px}\n  .hero h1{font-size:60px}\n  .hero .sub{font-size:12.5px;letter-spacing:.3em;margin-top:14px}\n  .hero .lede{font-size:16.5px;margin-top:22px}\n  .locator{font-size:10px;margin-top:18px}\n  .drop-note{padding:24px 20px;margin-top:34px}\n  .drop-note .q{font-size:20px}\n  .wl{flex-direction:column;max-width:300px;margin-top:22px}\n  .wl .gdiv{display:none}\n  .wl input{padding:14px 16px;border-bottom:1px solid rgba(207,167,95,.22);text-align:center}\n  .wl button{width:100%;padding:15px}\n  .micro{font-size:9.5px;letter-spacing:.1em}\n  .sec{padding:64px 0}\n  .gridhead{flex-direction:column;align-items:flex-start;gap:8px;margin-bottom:30px}\n  .gridhead .t{font-size:34px}\n  .gridhead .c{display:none}\n  .cardgrid{display:none}\n  .crew-mobile{display:block}\n  .infohead h3{font-size:32px}\n  .feats{grid-template-columns:1fr;gap:14px;margin-top:30px}\n  .feat{padding:24px 22px}\n  .feat p{font-size:14px}\n  .rwa .grid2{grid-template-columns:1fr;gap:30px}\n  .rwa h3{font-size:30px}\n  .rwa p{font-size:14.5px}\n  .series{padding:56px 0}\n  .series h4{font-size:25px}\n  .series h4 br{display:none}\n  .foot{padding:68px 0}\n  .foot h3{font-size:42px}\n  .foot p{font-size:14.5px}\n  .credit .in{flex-direction:column;gap:8px;text-align:center;padding:22px;font-size:10px}\n  body{display:flex;flex-direction:column}\n  .atmos{order:-1}\n  header.bar{order:1}\n  #crew{order:2;padding:30px 0 14px}\n  .hero{order:3;padding:14px 0 54px}\n  section.sec:not(.alt):not(.rwa){order:4}\n  .foot{order:5;padding:54px 0}\n  .credit{order:6}\n  .rwa,.series{display:none}\n  .gridhead{display:none}\n  .foot form,.foot p{display:none}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"atmos\"><div class=\"fog\"><\u002Fdiv><div class=\"grain\"><\u002Fdiv><div class=\"vign\"><\u002Fdiv><\u002Fdiv>\n\n<header class=\"bar\">\n  <div class=\"in\">\n    <div class=\"logo\"><span class=\"x\">✦<\u002Fspan>CARDX<\u002Fdiv>\n    <nav><a href=\"#drop\">The Drop<\u002Fa><a href=\"#crew\">The First Crew<\u002Fa><a href=\"#provenance\">Provenance<\u002Fa><a href=\"#entry\">Request Entry<\u002Fa><\u002Fnav>\n    <div class=\"status\">Entry by Signature<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div id=\"dockcrest\" aria-hidden=\"true\"><span class=\"ring\"><\u002Fspan><span class=\"ring r2\"><\u002Fspan><span class=\"mark\">✦<\u002Fspan><\u002Fdiv>\n\n<!-- HERO -->\n<section class=\"hero wrap\" id=\"drop\" data-stagger=\"\">\n  <div class=\"hero-open\">\n    <div class=\"crest\"><span class=\"ring\"><\u002Fspan><span class=\"ring r2\"><\u002Fspan><span class=\"mark\">✦<\u002Fspan><\u002Fdiv>\n    <div class=\"scrollcue\" aria-hidden=\"true\"><b>✦<\u002Fb>Scroll<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"drop-badge reveal\"><i><\u002Fi>Drop 001 · The First Crew<i><\u002Fi><\u002Fdiv>\n  <h1 class=\"reveal\">The <em>Signed<\u002Fem><br>Series<\u002Fh1>\n  <div class=\"sub reveal\">Signed · Serial · On&nbsp;Chain<\u002Fdiv>\n  <div class=\"locator reveal\" data-comment-anchor=\"c4a8ce4263-div\">By Invitation Only<\u002Fdiv>\n\n  <div class=\"entry reveal\" id=\"entry\" data-comment-anchor=\"4fbda46acf-div\">\n    <form class=\"wl gate\" data-wl=\"\">\n      <input class=\"f-code\" type=\"text\" placeholder=\"Invitation code\" aria-label=\"Invitation code\">\n      <span class=\"gdiv\"><\u002Fspan>\n      <input class=\"f-mail\" type=\"email\" placeholder=\"Email\" required=\"\" data-comment-anchor=\"88afab6f19-input\">\n      <button>Request Entry<\u002Fbutton>\n    <\u002Fform>\n    <div class=\"micro\">First claim · First crew · Held forever by serial<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- THE FIRST CREW -->\n<section class=\"sec alt\" id=\"crew\">\n  <div class=\"wrap\">\n    <div class=\"gridhead reveal\">\n      <div><div class=\"eyebrow\">The First Crew<\u002Fdiv><div class=\"t\">Sealed Until They Surface<\u002Fdiv><\u002Fdiv>\n      <div class=\"c\">Hover to bring each to the light<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cardgrid\" data-grid=\"\" data-stagger=\"\"><\u002Fdiv>\n    <div class=\"crew-mobile reveal\">\n      <div class=\"deck-count\"><span data-cur=\"\">01<\u002Fspan> / 09<\u002Fdiv>\n      <div class=\"deck-stage\" data-stage=\"\"><\u002Fdiv>\n      <div class=\"deck-hint\"><span>↑<\u002Fspan>Drag up<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHAT IS THE SIGNED SERIES -->\n<section class=\"sec\">\n  <div class=\"wrap\">\n    <div class=\"infohead reveal\"><div class=\"eyebrow\">What is the Signed Series<\u002Fdiv>\n    <h3>A signature you can hold. A serial number no one else will ever own.<\u002Fh3><\u002Fdiv>\n    <div class=\"feats\" data-stagger=\"\">\n      <div class=\"feat reveal\"><span class=\"num\">I<\u002Fspan><h4>Hand-Signed<\u002Fh4><p>Each card is signed in person by its cast member, verified at the moment of signing, and sealed against reproduction.<\u002Fp><\u002Fdiv>\n      <div class=\"feat reveal\"><span class=\"num\">II<\u002Fspan><h4>Singularly Numbered<\u002Fh4><p>Every signature bears a unique serial. Across the entire limited run, your number belongs to you and no one else.<\u002Fp><\u002Fdiv>\n      <div class=\"feat reveal\"><span class=\"num\">III<\u002Fspan><h4>Phygital by CardX<\u002Fh4><p>Physical card and digital record are bound as one by CardX — the object and its title never part ways.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- RWA -->\n<section class=\"sec rwa\" id=\"provenance\">\n  <div class=\"wrap\">\n    <div class=\"grid2\">\n      <div class=\"reveal\">\n        <div class=\"eyebrow\">Provenance · On-Chain<\u002Fdiv>\n        <h3>The signed, serial-numbered card becomes ownership recorded on the blockchain.<\u002Fh3>\n        <p>CardX elevates each signature into a real-world asset with permanent on-chain title. Provenance is incorruptible, transfer is effortless, and the physical card remains the anchor of value — the quiet certainty behind a collectible worth keeping.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"chain reveal\" data-stagger=\"\">\n        <div class=\"chip reveal\"><span class=\"d\">i<\u002Fspan><div><b>Verified<\u002Fb><span>Signature captured &amp; sealed at source<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"chip reveal\"><span class=\"d\">ii<\u002Fspan><div><b>Numbered &amp; Minted<\u002Fb><span>Unique serial issued as on-chain title<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"chip reveal\"><span class=\"d\">iii<\u002Fspan><div><b>Owned &amp; Transferable<\u002Fb><span>Permanent provenance · effortless transfer<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SERIES TEASER -->\n<section class=\"series\">\n  <div class=\"wrap\">\n    <div class=\"e reveal\">An Ongoing Series<\u002Fdiv>\n    <h4 class=\"reveal\">The First Crew is only where the waters begin. <br>More will be sealed in signature, drop after drop.<\u002Fh4>\n    <div class=\"ticks\"><b>001<\u002Fb><i><\u002Fi><u>002<\u002Fu><i><\u002Fi><u>···<\u002Fu><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER CTA -->\n<section class=\"foot\">\n  <div class=\"wrap\" data-stagger=\"\">\n    <div class=\"rule reveal\"><\u002Fdiv>\n    <h3 class=\"reveal\">The vault is <em>sealed<\u002Fem>.<\u002Fh3>\n    <p class=\"reveal\">Drop dates aren't announced, they must be caught.&nbsp;\nJoin the manifest for first claim on the First Crew.<\u002Fp>\n    <form class=\"wl reveal\" data-wl=\"\"><input type=\"email\" placeholder=\"Email\" required=\"\"><button>Request Entry<\u002Fbutton><\u002Fform>\n    <div class=\"micro reveal\">By invitation · By serial · By signature<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"credit\"><div class=\"in\"><span>CardX © 2026 · Phygital Collectibles Infrastructure<\u002Fspan><span>The Signed Series · Drop 001<\u002Fspan><\u002Fdiv><\u002Fdiv>\n\n\n\n<script>\nconst CREW = ['luffy','zoro','sanji','smoker','crocodile','shanks','buggy','mihawk','tashigi'];\nconst grid = document.querySelector('[data-grid]');\nCREW.forEach((k,idx)=>{\n  const card = document.createElement('div');\n  card.className='mcard reveal';\n  const ser = 'N\\u00B0\\u2009'+String(idx+1).padStart(3,'0');\n  card.innerHTML =\n    '<span class=\"ser\">'+ser+'<\u002Fspan>'+\n    '<div class=\"spot\"><\u002Fdiv>'+\n    '<div class=\"silwrap\"><img class=\"sil\" src=\"'+(window.__resources?window.__resources['cast_'+k]:'assets/cast/'+k+'.png')+'\" alt=\"sealed silhouette\"><\u002Fdiv>'+\n    '<div class=\"foil\"><\u002Fdiv>'+\n    '<div class=\"lock\">SEALED<\u002Fdiv>';\n  grid.appendChild(card);\n});\n\ndocument.querySelectorAll('.mcard').forEach(card=>{\n  card.addEventListener('pointermove',e=>{\n    const r=card.getBoundingClientRect();\n    const x=(e.clientX-r.left)/r.width, y=(e.clientY-r.top)/r.height;\n    const foil=card.querySelector('.foil');\n    if(foil) foil.style.backgroundPosition=(x*100)+'% '+(y*100)+'%';\n    card.style.transform='perspective(820px) translateY(-5px) rotateY('+((x-.5)*9)+'deg) rotateX('+((.5-y)*9)+'deg)';\n  });\n  card.addEventListener('pointerleave',()=>{card.style.transform=''});\n});\n\ndocument.querySelectorAll('form[data-wl]').forEach(f=>{\n  f.addEventListener('submit',e=>{\n    e.preventDefault();\n    const code=f.querySelector('.f-code');\n    const admitted=code && code.value.trim().length>0;\n    f.classList.add('done');\n    f.innerHTML = admitted\n      ? '✦&nbsp;&nbsp;Admitted — your entry is confirmed.'\n      : '✦&nbsp;&nbsp;You’re on the list.';\n  });\n});\n\nconst stage=document.querySelector('[data-stage]');\nif(stage){\n  document.querySelectorAll('.cardgrid .mcard').forEach(c=>{\n    const cl=c.cloneNode(true);\n    cl.classList.remove('reveal','in');\n    cl.style.transitionDelay='';\n    stage.appendChild(cl);\n  });\n  const dcards=[...stage.querySelectorAll('.mcard')];\n  const cur=document.querySelector('[data-cur]');\n  let i=0, dragging=false, startY=0, dy=0, active=null;\n  const draw=()=>{\n    dcards.forEach((c,n)=>{\n      c.classList.remove('active','behind','gone','out');\n      c.classList.add(n===i?'active':n===i+1?'behind':'gone');\n      c.style.transform='';c.style.opacity='';\n      c.style.zIndex=n===i?3:n===i+1?2:1;\n    });\n    if(cur)cur.textContent=String(i+1).padStart(2,'0');\n  };\n  const advance=()=>{\n    const a=dcards[i];a.classList.add('out');a.style.transform='';a.style.opacity='';a.style.zIndex=4;\n    setTimeout(()=>{i=(i+1)%dcards.length;draw();},360);\n  };\n  draw();\n  if(dcards[0]){dcards[0].classList.add('peek');setTimeout(()=>dcards[0]&&dcards[0].classList.remove('peek'),1300);}\n  stage.addEventListener('pointerdown',e=>{\n    active=dcards[i];dragging=true;startY=e.clientY;dy=0;\n    active.style.transition='none';\n    try{stage.setPointerCapture(e.pointerId);}catch(_){}\n  });\n  stage.addEventListener('pointermove',e=>{\n    if(!dragging||!active)return;\n    dy=e.clientY-startY;\n    const v=dy<0?dy:dy*0.25;\n    const p=Math.max(0,Math.min(1,-dy/220));\n    active.style.transform='translateY('+v+'px) rotate('+(v*0.02)+'deg)';\n    active.style.opacity=String(1-p*0.6);\n  });\n  const release=()=>{\n    if(!dragging||!active)return;\n    dragging=false;active.style.transition='';\n    if(dy<-70||Math.abs(dy)<8){advance();}\n    else{active.style.transform='';active.style.opacity='';}\n    active=null;dy=0;\n  };\n  stage.addEventListener('pointerup',release);\n  stage.addEventListener('pointercancel',release);\n}\n\n/* line-by-line scroll reveal */\n(function(){\n  const reveals=[...document.querySelectorAll('.reveal')];\n  // stagger siblings within a group so co-visible lines cascade\n  document.querySelectorAll('[data-stagger]').forEach(group=>{\n    [...group.children].filter(el=>el.classList.contains('reveal')).forEach((el,n)=>{\n      el.style.transitionDelay=(n*90)+'ms';\n    });\n  });\n  const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n  if(reduce||!('IntersectionObserver' in window)){\n    reveals.forEach(el=>{el.style.transitionDelay='0ms';el.classList.add('in');});\n    return;\n  }\n  const io=new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{\n      if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}\n    });\n  },{threshold:0.18,rootMargin:'0px 0px -8% 0px'});\n  reveals.forEach(el=>io.observe(el));\n})();\n\n/* crest: scroll-docks on desktop; reveals then flies up to the header mark on mobile */\n(function(){\n  const dock=document.getElementById('dockcrest');\n  const logoX=document.querySelector('.logo .x');\n  const cueEl=document.querySelector('.scrollcue');\n  if(!dock||!logoX) return;\n  const mq=window.matchMedia('(min-width:761px)');\n  const smooth=p=>p*p*(3-2*p);\n  let startX=0,startY=0,active=false,introDone=false;\n  function measure(){startX=window.innerWidth/2;startY=68+(window.innerHeight-68)/2;}\n  function target(){const r=logoX.getBoundingClientRect();return {x:r.left+r.width/2,y:r.top+r.height/2};}\n  function place(x,y,s){dock.style.transform='translate('+x+'px,'+y+'px) translate(-50%,-50%) scale('+s+')';}\n  function frame(){\n    if(!active) return;\n    const dist=Math.max(140,(window.innerHeight-68)*0.62);\n    const p=Math.min(1,Math.max(0,window.scrollY/dist));\n    const t=smooth(p), tg=target();\n    place(startX+(tg.x-startX)*t, startY+(tg.y-startY)*t, 1+((24/74)-1)*t);\n    if(cueEl) cueEl.style.opacity=String(Math.max(0,1-p*2.4));\n  }\n  function mobileIntro(){\n    if(introDone) return; introDone=true;\n    document.body.classList.add('dock');\n    dock.style.transition='none';\n    place(window.innerWidth/2, window.innerHeight*0.46, 1.18);\n    dock.getBoundingClientRect();\n    requestAnimationFrame(()=>setTimeout(()=>{\n      const tg=target();\n      dock.style.transition='transform 1.2s cubic-bezier(.45,.05,.2,1)';\n      place(tg.x, tg.y, 24/74);\n    },820));\n  }\n  function apply(){\n    if(mq.matches){\n      introDone=false;active=true;dock.style.transition='none';\n      document.body.classList.add('dock');measure();frame();\n    } else {\n      active=false;\n      if(cueEl)cueEl.style.opacity='';\n      mobileIntro();\n    }\n  }\n  apply();\n  window.addEventListener('scroll',frame,{passive:true});\n  window.addEventListener('resize',()=>{measure();if(mq.matches){apply();frame();}});\n  if(mq.addEventListener)mq.addEventListener('change',apply);else if(mq.addListener)mq.addListener(apply);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
